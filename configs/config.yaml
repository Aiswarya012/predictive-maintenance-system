project:
  name: predictive-maintenance-system
  random_seed: 42

data:
  raw_path: data/raw/ai4i2020.csv
  processed_path: data/processed/processed.csv
  test_size: 0.2
  val_size: 0.15
  target_column: Machine failure
  drop_columns:
    - UDI
    - Product ID
    - TWF
    - HDF
    - PWF
    - OSF
    - RNF

features:
  categorical_columns:
    - Type
  numerical_columns:
    - Air temperature [K]
    - Process temperature [K]
    - Rotational speed [rpm]
    - Torque [Nm]
    - Tool wear [min]
  engineered:
    - temp_diff
    - power
    - wear_torque_interaction

model:
  algorithm: xgboost
  params:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    scale_pos_weight: 29.0
    eval_metric: logloss
    random_state: 42
  save_dir: models

api:
  host: 0.0.0.0
  port: 8000
  model_path: models/model_latest.joblib
  preprocessor_path: models/preprocessor_latest.joblib
